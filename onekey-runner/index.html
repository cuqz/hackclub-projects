<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE KEY RUNNER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            background: #130f0c;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 12px;
            position: relative;
        }
        canvas {
            border: 1px solid rgba(255, 235, 210, 0.08);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.06), 0 0 80px rgba(245, 158, 11, 0.03);
            image-rendering: auto;
            outline: none;
            touch-action: none;
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            position: relative;
        }
        #menuOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #menuOverlay.active {
            pointer-events: auto;
        }
        .menu-box {
            background: rgba(19, 15, 12, 0.94);
            border: 1px solid rgba(255, 235, 210, 0.12);
            border-radius: 16px;
            padding: 30px 40px;
            max-width: 360px;
            width: 90%;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            color: #f0ece6;
            font-family: 'JetBrains Mono', monospace;
            pointer-events: auto;
            display: none;
        }
        .menu-box.active {
            display: block;
        }
        .menu-box h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #f5e6d3;
            font-weight: 400;
        }
        .menu-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,235,210,0.06);
        }
        .menu-row:last-child {
            border-bottom: none;
        }
        .menu-label {
            font-size: 12px;
            color: #a89888;
            font-weight: 500;
        }
        .menu-control {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border 0.2s;
        }
        .color-swatch:hover {
            transform: scale(1.05);
        }
        .color-swatch.active {
            border-color: #f5e6d3;
            box-shadow: 0 0 12px rgba(245, 230, 211, 0.25);
        }
        .toggle-btn {
            background: rgba(255,235,210,0.08);
            border: 1px solid rgba(255,235,210,0.15);
            color: #f0ece6;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .toggle-btn:hover {
            background: rgba(255,235,210,0.15);
        }
        .toggle-btn.on {
            background: rgba(245, 158, 11, 0.2);
            border-color: #f59e0b;
        }
        .reset-btn {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #f87171;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:hover {
            background: rgba(220, 38, 38, 0.25);
        }
        .close-btn {
            background: none;
            border: none;
            color: #888078;
            font-size: 18px;
            cursor: pointer;
            position: absolute;
            top: 12px;
            right: 16px;
            font-family: 'JetBrains Mono', monospace;
        }
        .close-btn:hover {
            color: #f5e6d3;
        }
        @media (max-width: 600px) {
            .menu-box {
                padding: 20px;
                max-width: 300px;
            }
            .menu-label {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
<div id="wrap">
    <canvas id="c" tabindex="0" aria-label="One Key Runner – press any key to jump"></canvas>
    <div id="menuOverlay">
        <div class="menu-box" id="menuBox">
            <button class="close-btn" id="closeMenu">✕</button>
            <h2>SETTINGS</h2>
            <div class="menu-row">
                <span class="menu-label">🔊 Sound</span>
                <div class="menu-control">
                    <button class="toggle-btn on" id="soundToggle">On</button>
                </div>
            </div>
            <div class="menu-row">
                <span class="menu-label">🎨 Color</span>
                <div class="menu-control" id="colorSwatches">
                    <div class="color-swatch active" style="background:#f59e0b" data-color="#f59e0b"></div>
                    <div class="color-swatch" style="background:#f472b6" data-color="#f472b6"></div>
                    <div class="color-swatch" style="background:#34d399" data-color="#34d399"></div>
                    <div class="color-swatch" style="background:#fb923c" data-color="#fb923c"></div>
                </div>
            </div>
            <div class="menu-row">
                <span class="menu-label">🏆 Best Score</span>
                <div class="menu-control">
                    <button class="reset-btn" id="resetBest">Reset</button>
                </div>
            </div>
            <div style="text-align:center; margin-top:14px; font-size:9px; color:#6a625a;">
                Press <kbd style="background:rgba(255,235,210,0.08);padding:0 6px;border-radius:3px;font-family:inherit;color:#a89888;">M</kbd> or click gear to toggle
            </div>
        </div>
    </div>
</div>
<script>
console.log('ONE KEY RUNNER starting...');

// ---- Setup ------------------------------------------------------------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W_REF = 900;
const H_REF = 500;
let scale = 1;

// ---- Audio ------------------------------------------------------------
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        try { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } catch (_) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => {});
    }
}

function playBeep(freq, duration, type = 'square', vol = 0.08) {
    if (!settings.sound) return;
    try {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch (_) {}
}
const jumpSound = () => playBeep(520, 0.08, 'square', 0.06);
const deathSound = () => { playBeep(120, 0.4, 'sawtooth', 0.1);
    playBeep(80, 0.6, 'sawtooth', 0.08); };
const scoreSound = () => playBeep(880, 0.06, 'sine', 0.05);
const dodgeSound = () => playBeep(1200, 0.04, 'sine', 0.04);

// ---- Settings ---------------------------------------------------------
let settings = {
    sound: true,
    color: '#f59e0b'
};

function loadSettings() {
    try {
        const s = localStorage.getItem('okr_settings');
        if (s) {
            const parsed = JSON.parse(s);
            settings.sound = parsed.sound !== undefined ? parsed.sound : true;
            settings.color = parsed.color || '#f59e0b';
        }
    } catch (_) {}
    if (player) player.color = settings.color;
}

function saveSettings() {
    try {
        localStorage.setItem('okr_settings', JSON.stringify(settings));
    } catch (_) {}
}

// ---- Game state -------------------------------------------------------
const STATE = { MENU: 0, PLAYING: 1, DEAD: 2 };
let state = STATE.MENU;
let score = 0;
let bestScore = parseInt(localStorage.getItem('okr_best') || '0') || 0;
let speed = 7;
const BASE_SPEED = 7;
const MAX_SPEED = 18;
const GROUND_Y = H_REF - 80;
let frameCount = 0;
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ---- Player -----------------------------------------------------------
const player = {
    x: 140,
    y: GROUND_Y - 28,
    w: 22,
    h: 28,
    vy: 0,
    gravity: 0.4,
    jumpForce: -8.5,
    grounded: true,
    color: '#f59e0b',
    trail: [],
    squish: 1,
    squishTarget: 1
};
loadSettings();

// ---- Particles --------------------------------------------------------
let particles = [];

function spawnParticles(x, y, count, colors, spread, life, sizeRange = [1.5, 4]) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * spread + 1;
        const color = colors[Math.floor(Math.random() * colors.length)];
        particles.push({
            x,
            y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 2,
            life: Math.random() * life + life * 0.3,
            maxLife: life * 1.3,
            size: Math.random() * (sizeRange[1] - sizeRange[0]) + sizeRange[0],
            color,
            decay: 0.015 + Math.random() * 0.015
        });
    }
}

// ---- Obstacles --------------------------------------------------------
let obstacles = [];
let obstacleTimer = 0;
let minObstacleGap = 80;
let lastMilestone = 0;
let dodgeTexts = [];

// ---- Death flash & best beat ------------------------------------------
let deathFlashAlpha = 0;
let bestBeatParticles = false;

// ---- Day/night cycle (warm) -------------------------------------------
function getDayNightPalette(progress) {
    const day = {
        bgTop: '#3d2a1a',
        bgBot: '#1a120e',
        groundTop: '#4d3624',
        ground: '#2a1e16',
        groundLine: 'rgba(245, 158, 11, 0.15)',
        starAlpha: 0.05,
        mountainBase: 'hsl(30, 30%, 18%)',
        mountainAlt: 'hsl(25, 25%, 14%)'
    };
    const night = {
        bgTop: '#130f0c',
        bgBot: '#0a0806',
        groundTop: '#1a1410',
        ground: '#0d0a08',
        groundLine: 'rgba(245, 158, 11, 0.08)',
        starAlpha: 0.6,
        mountainBase: 'hsl(20, 20%, 8%)',
        mountainAlt: 'hsl(15, 15%, 6%)'
    };
    const lerp = (a, b, t) => a + (b - a) * t;
    const lerpColor = (c1, c2, t) => {
        const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
        const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
        const r = Math.round(lerp(r1, r2, t)), g = Math.round(lerp(g1, g2, t)), b = Math.round(lerp(b1, b2, t));
        return `rgb(${r},${g},${b})`;
    };
    return {
        bgTop: lerpColor(day.bgTop, night.bgTop, progress),
        bgBot: lerpColor(day.bgBot, night.bgBot, progress),
        groundTop: lerpColor(day.groundTop, night.groundTop, progress),
        ground: lerpColor(day.ground, night.ground, progress),
        groundLine: `rgba(245,158,11,${lerp(0.15, 0.08, progress)})`,
        starAlpha: lerp(0.05, 0.6, progress),
        mountainBase: `hsl(${lerp(30, 20, progress)}, 30%, ${lerp(18, 8, progress)}%)`,
        mountainAlt: `hsl(${lerp(25, 15, progress)}, 25%, ${lerp(14, 6, progress)}%)`
    };
}

const COLORS = {
    bg: '#130f0c',
    bgTop: '#1a1410',
    bgBot: '#0a0806',
    ground: '#1a1410',
    groundTop: '#2a1e16',
    groundLine: 'rgba(245,158,11,0.08)',
    player: '#f59e0b',
    playerGlow: 'rgba(245,158,11,0.4)',
    playerHighlight: 'rgba(255,235,210,0.12)',
    eyeWhite: '#f5ece6',
    eyePupil: '#130f0c',
    obstacle: '#dc2626',
    obstacleGlow: 'rgba(220,38,38,0.3)',
    obstacleHighlight: 'rgba(255,235,210,0.08)',
    text: '#f0ece6',
    textDim: '#a89888',
    accent: '#f59e0b',
    accentGlow: 'rgba(245,158,11,0.25)',
    gold: '#fbbf24',
    goldGlow: 'rgba(251,191,36,0.25)',
    trail: 'rgba(245,158,11,0.2)',
    deathOverlay: 'rgba(19,15,12,0.7)'
};

// ---- Stars (warmer tint) ----------------------------------------------
let stars = [];
for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random() * W_REF,
        y: Math.random() * (GROUND_Y - 20),
        size: Math.random() * 1.8 + 0.3,
        speed: Math.random() * 0.3 + 0.05,
        alpha: Math.random() * 0.5 + 0.1,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinkleOffset: Math.random() * Math.PI * 2
    });
}

// ---- Mountains (warm) -------------------------------------------------
let mountains = [];
for (let i = 0; i < 14; i++) {
    const hue = 25 + Math.random() * 15;
    const light = 10 + Math.random() * 10;
    mountains.push({
        x: i * 85,
        w: 100 + Math.random() * 80,
        h: 50 + Math.random() * 110,
        color: `hsl(${hue}, 25%, ${light}%)`,
        layer: Math.floor(Math.random() * 3)
    });
}

// ---- Ground decoration ------------------------------------------------
let groundDecor = [];
for (let i = 0; i < 40; i++) {
    groundDecor.push({
        x: Math.random() * W_REF,
        size: Math.random() * 1.5 + 0.5,
        alpha: Math.random() * 0.10 + 0.02
    });
}

// ---- Helpers ----------------------------------------------------------
function rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
        a.y < b.y + b.h && a.y + a.h > b.y;
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
        const r = typeof radii === 'number' ? radii : (radii || 0);
        const radius = Math.min(r, w / 2, h / 2);
        this.moveTo(x + radius, y);
        this.lineTo(x + w - radius, y);
        this.quadraticCurveTo(x + w, y, x + w, y + radius);
        this.lineTo(x + w, y + h - radius);
        this.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        this.lineTo(x + radius, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - radius);
        this.lineTo(x, y + radius);
        this.quadraticCurveTo(x, y, x + radius, y);
        this.closePath();
        return this;
    };
}

// ---- Resize canvas ----------------------------------------------------
function resizeCanvas() {
    const wrap = document.getElementById('wrap');
    const mw = Math.max(wrap.clientWidth - 24, 100);
    const mh = Math.max(wrap.clientHeight - 24, 100);
    let newScale = Math.min(mw / W_REF, mh / H_REF, 1.4);
    if (newScale < 0.1) newScale = 0.1;
    scale = newScale;
    const w = Math.floor(W_REF * scale);
    const h = Math.floor(H_REF * scale);
    if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
    }
    console.log(`Canvas resized: ${w}x${h} scale=${scale.toFixed(2)}`);
}
resizeCanvas();

// ---- Reset game -------------------------------------------------------
function resetGame() {
    player.y = GROUND_Y - player.h;
    player.vy = 0;
    player.grounded = true;
    player.trail = [];
    obstacles = [];
    obstacleTimer = 0;
    score = 0;
    speed = BASE_SPEED;
    particles = [];
    dodgeTexts = [];
    lastMilestone = 0;
    frameCount = 0;
    deathFlashAlpha = 0;
    bestBeatParticles = false;
}

// ---- Jump -------------------------------------------------------------
function jump() {
    initAudio();
    if (state === STATE.MENU) {
        state = STATE.PLAYING;
        resetGame();
        jumpSound();
        return;
    }
    if (state === STATE.DEAD) {
        state = STATE.PLAYING;
        resetGame();
        jumpSound();
        return;
    }
    if (state === STATE.PLAYING && player.grounded) {
        player.vy = player.jumpForce;
        player.grounded = false;
        player.squishTarget = 1.15;
        jumpSound();
        spawnParticles(
            player.x + player.w / 2,
            player.y + player.h,
            6,
            [player.color, '#fbbf24', '#fcd34d'],
            3, 0.4, [1.5, 3.5]
        );
    }
}

// ---- Generate obstacle ------------------------------------------------
function generateObstacle() {
    const typeRand = Math.random();
    let type;
    if (typeRand < 0.4) type = 'spike';
    else if (typeRand < 0.7) type = 'crawl';
    else if (typeRand < 0.9) type = 'float';
    else type = 'moving';

    const x = W_REF + 40;
    const h = 24 + Math.floor(Math.random() * 12);

    switch (type) {
        case 'spike':
            obstacles.push({ x, y: GROUND_Y - h, w: 18, h, type: 'spike', hit: false });
            break;
        case 'crawl':
            obstacles.push({ x, y: GROUND_Y - 12, w: 30, h: 12, type: 'crawl', hit: false });
            break;
        case 'float':
            obstacles.push({ x, y: GROUND_Y - 70 - Math.random() * 60, w: 20, h: 20, type: 'float', hit: false });
            break;
        case 'moving':
            const phase = Math.random() * Math.PI * 2;
            obstacles.push({ x, y: GROUND_Y - 70 - Math.random() * 40, w: 20, h: 20, type: 'moving', hit: false, phase, baseY: GROUND_Y - 70 - Math.random() * 40, amplitude: 20 + Math.random() * 20 });
            break;
    }
}

// ---- Update -----------------------------------------------------------
function update() {
    frameCount++;

    if (state === STATE.MENU) {
        player.y = GROUND_Y - player.h + Math.sin(frameCount * 0.03) * 4;
        return;
    }

    if (state === STATE.PLAYING) {
        player.vy += player.gravity;
        player.y += player.vy;
        if (player.y >= GROUND_Y - player.h) {
            player.y = GROUND_Y - player.h;
            player.vy = 0;
            player.grounded = true;
            player.squishTarget = 0.85;
        } else {
            player.grounded = false;
        }

        player.squish += (player.squishTarget - player.squish) * 0.15;
        if (player.grounded && Math.abs(player.squish - 1) < 0.01) player.squishTarget = 1;

        if (frameCount % 2 === 0) {
            player.trail.push({ x: player.x + player.w / 2, y: player.y + player.h / 2, life: 1 });
            if (player.trail.length > 18) player.trail.shift();
        }
        for (let t = player.trail.length - 1; t >= 0; t--) {
            player.trail[t].life -= 0.06;
            if (player.trail[t].life <= 0) player.trail.splice(t, 1);
        }

        score += speed * 0.008;
        const milestone = Math.floor(score / 100);
        if (milestone > lastMilestone && milestone > 0) {
            lastMilestone = milestone;
            scoreSound();
        }

        if (speed < MAX_SPEED) speed = BASE_SPEED + score * 0.004;

        const gap = Math.max(minObstacleGap, 120 - score * 0.3);
        obstacleTimer++;
        if (obstacleTimer > gap + Math.random() * 40) {
            generateObstacle();
            obstacleTimer = 0;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i];
            obs.x -= speed;
            if (obs.type === 'moving') {
                obs.y = obs.baseY + Math.sin(frameCount * 0.04 + obs.phase) * obs.amplitude;
            }
            if (obs.x + obs.w < -50) obstacles.splice(i, 1);
        }

        const pHitbox = { x: player.x + 3, y: player.y + 3, w: player.w - 6, h: player.h - 6 };
        let alive = true;
        for (const obs of obstacles) {
            if (rectCollide(pHitbox, obs)) { alive = false; break; }
        }

        for (const obs of obstacles) {
            if (!obs.hit && obs.x + obs.w < player.x) {
                obs.hit = true;
                dodgeTexts.push({ x: obs.x + obs.w / 2, y: obs.y, text: '+1', life: 1 });
                dodgeSound();
            }
        }

        if (!alive) {
            state = STATE.DEAD;
            deathSound();
            deathFlashAlpha = 0.5;
            spawnParticles(player.x + player.w / 2, player.y + player.h / 2, 25,
                ['#dc2626', '#ef4444', '#f87171', '#fca5a5'], 6, 1.0, [2, 5]
            );
            spawnParticles(player.x + player.w / 2, player.y + player.h / 2, 12,
                ['#f5ece6', '#fbbf24'], 3, 0.6, [1, 2.5]
            );
            if (Math.floor(score) > bestScore) {
                bestScore = Math.floor(score);
                localStorage.setItem('okr_best', bestScore.toString());
                bestBeatParticles = true;
                spawnParticles(W_REF / 2, H_REF / 2 - 30, 40,
                    ['#fbbf24', '#f59e0b', '#fcd34d', '#34d399', '#f472b6', '#fb923c'],
                    8, 1.5, [2, 6]
                );
            }
        }

        for (const m of mountains) m.x -= speed * 0.15;
        for (const m of mountains) {
            if (m.x + m.w < -20) {
                let maxX = 0;
                for (const m2 of mountains) if (m2.x > maxX) maxX = m2.x;
                m.x = maxX + 80 + Math.random() * 100;
                m.h = 50 + Math.random() * 110;
                const hue = 25 + Math.random() * 15;
                const light = 10 + Math.random() * 10;
                m.color = `hsl(${hue}, 25%, ${light}%)`;
            }
        }

        for (const s of stars) {
            s.x -= s.speed * 0.3;
            if (s.x < -5) { s.x = W_REF + 5;
                s.y = Math.random() * (GROUND_Y - 20); }
        }

        for (const d of groundDecor) {
            d.x -= speed * 0.2;
            if (d.x < -5) { d.x = W_REF + 5;
                d.alpha = Math.random() * 0.08 + 0.02; }
        }
    }

    if (state === STATE.DEAD) {
        player.vy += 0.3;
        player.y += player.vy;
        if (deathFlashAlpha > 0) deathFlashAlpha -= 0.015;
        if (deathFlashAlpha < 0) deathFlashAlpha = 0;
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }

    for (let i = dodgeTexts.length - 1; i >= 0; i--) {
        const d = dodgeTexts[i];
        d.y -= 0.8;
        d.life -= 0.02;
        if (d.life <= 0) dodgeTexts.splice(i, 1);
    }

    if (bestBeatParticles && particles.length < 10) bestBeatParticles = false;
}

// ---- Draw ------------------------------------------------------------
function draw() {
    if (canvas.width === 0 || canvas.height === 0) {
        resizeCanvas();
        if (canvas.width === 0 || canvas.height === 0) return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.scale(scale, scale);

    const progress = Math.min(1, score / 800);
    const pal = getDayNightPalette(progress);

    const bgGrad = ctx.createLinearGradient(0, 0, 0, H_REF);
    bgGrad.addColorStop(0, pal.bgTop);
    bgGrad.addColorStop(1, pal.bgBot);
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W_REF, H_REF);

    for (const s of stars) {
        const twinkle = Math.sin(frameCount * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
        ctx.globalAlpha = s.alpha * twinkle * pal.starAlpha;
        ctx.fillStyle = '#f5ece6';
        ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    ctx.globalAlpha = 1;

    const mBase = pal.mountainBase;
    const mAlt = pal.mountainAlt;
    for (const layer of [2, 1, 0]) {
        ctx.globalAlpha = layer === 2 ? 0.5 : layer === 1 ? 0.7 : 1;
        for (const m of mountains) {
            if (m.layer !== layer) continue;
            ctx.fillStyle = layer === 2 ? mAlt : mBase;
            ctx.beginPath();
            ctx.moveTo(m.x, GROUND_Y);
            ctx.lineTo(m.x + m.w / 2, GROUND_Y - m.h);
            ctx.lineTo(m.x + m.w, GROUND_Y);
            ctx.closePath();
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;

    const gGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H_REF);
    gGrad.addColorStop(0, pal.groundTop);
    gGrad.addColorStop(0.3, pal.ground);
    gGrad.addColorStop(1, pal.bgBot);
    ctx.fillStyle = gGrad;
    ctx.fillRect(0, GROUND_Y, W_REF, H_REF - GROUND_Y);
    ctx.fillStyle = pal.groundLine;
    ctx.fillRect(0, GROUND_Y, W_REF, 1);
    ctx.globalAlpha = 0.3;
    ctx.fillRect(0, GROUND_Y + 3, W_REF, 0.5);
    ctx.globalAlpha = 1;

    for (const d of groundDecor) {
        ctx.globalAlpha = d.alpha;
        ctx.fillStyle = '#f59e0b';
        ctx.fillRect(d.x, GROUND_Y + 5 + Math.random() * 8, d.size, d.size);
    }
    ctx.globalAlpha = 1;

    for (const obs of obstacles) {
        ctx.shadowColor = COLORS.obstacleGlow;
        ctx.shadowBlur = 14;
        ctx.fillStyle = COLORS.obstacle;
        if (obs.type === 'spike') {
            ctx.beginPath();
            ctx.moveTo(obs.x + obs.w / 2, obs.y);
            ctx.lineTo(obs.x, obs.y + obs.h);
            ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = COLORS.obstacleHighlight;
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,235,210,0.06)';
            ctx.beginPath();
            ctx.moveTo(obs.x + obs.w / 2, obs.y + 2);
            ctx.lineTo(obs.x + 3, obs.y + obs.h - 3);
            ctx.lineTo(obs.x + obs.w - 3, obs.y + obs.h - 3);
            ctx.closePath();
            ctx.fill();
        } else if (obs.type === 'crawl') {
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 3);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,235,210,0.08)';
            ctx.fillRect(obs.x + 2, obs.y + 2, obs.w - 4, obs.h * 0.3);
        } else if (obs.type === 'float' || obs.type === 'moving') {
            const oGrad = ctx.createLinearGradient(obs.x, obs.y, obs.x, obs.y + obs.h);
            oGrad.addColorStop(0, '#ef4444');
            oGrad.addColorStop(0.5, COLORS.obstacle);
            oGrad.addColorStop(1, '#b91c1c');
            ctx.fillStyle = oGrad;
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 3);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,235,210,0.08)';
            ctx.fillRect(obs.x + 2, obs.y + 2, obs.w - 4, obs.h * 0.3);
        }
        ctx.shadowBlur = 0;
    }

    for (const d of dodgeTexts) {
        ctx.globalAlpha = Math.max(0, d.life);
        ctx.fillStyle = COLORS.gold;
        ctx.font = `600 ${11}px "JetBrains Mono", monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(d.text, d.x, d.y);
    }
    ctx.globalAlpha = 1;

    for (const t of player.trail) {
        ctx.globalAlpha = t.life * 0.3;
        ctx.fillStyle = COLORS.trail;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 3.5 * t.life, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
    ctx.scale(1 / player.squish, player.squish);
    const rx = player.w / 2,
        ry = player.h / 2;
    ctx.shadowColor = COLORS.playerGlow;
    ctx.shadowBlur = 22;
    const pGrad = ctx.createLinearGradient(-rx, -ry, rx, ry);
    const col = player.color;
    pGrad.addColorStop(0, col);
    pGrad.addColorStop(0.5, col);
    let darkCol = '#b7791a';
    if (col === '#f472b6') darkCol = '#be4d7a';
    else if (col === '#34d399') darkCol = '#1f8a5c';
    else if (col === '#fb923c') darkCol = '#c26a2a';
    pGrad.addColorStop(1, darkCol);
    ctx.fillStyle = pGrad;
    ctx.beginPath();
    ctx.roundRect(-rx, -ry, player.w, player.h, 5);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = COLORS.playerHighlight;
    ctx.beginPath();
    ctx.roundRect(-rx + 3, -ry + 3, player.w - 6, player.h * 0.35, 3);
    ctx.fill();
    ctx.fillStyle = COLORS.eyeWhite;
    ctx.fillRect(3, -3, 6, 6);
    ctx.fillStyle = COLORS.eyePupil;
    ctx.fillRect(5, -3, 4, 6);
    ctx.restore();

    for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    if (deathFlashAlpha > 0) {
        ctx.fillStyle = `rgba(220, 38, 38, ${deathFlashAlpha})`;
        ctx.fillRect(0, 0, W_REF, H_REF);
    }

    if (state === STATE.MENU) drawMenu();
    if (state === STATE.PLAYING || state === STATE.DEAD) drawHUD();
    if (state === STATE.DEAD) drawDeathOverlay();

    if (state !== STATE.MENU) {
        const gearX = W_REF - 40,
            gearY = 16,
            gearSize = 20;
        ctx.fillStyle = 'rgba(255,235,210,0.2)';
        ctx.font = `${gearSize}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⚙', gearX, gearY);
        window._gearRect = { x: gearX - gearSize / 2, y: gearY - gearSize / 2, w: gearSize, h: gearSize };
    }

    ctx.restore();
}

function drawMenu() {
    const vig = ctx.createRadialGradient(W_REF / 2, H_REF / 2, 0, W_REF / 2, H_REF / 2, 400);
    vig.addColorStop(0, 'rgba(19,15,12,0)');
    vig.addColorStop(0.6, 'rgba(19,15,12,0)');
    vig.addColorStop(1, 'rgba(19,15,12,0.5)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W_REF, H_REF);

    ctx.shadowColor = COLORS.accentGlow;
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#f5ece6';
    ctx.font = `400 44px "Bebas Neue", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('ONE KEY', W_REF / 2, H_REF / 2 - 75);
    ctx.fillText('RUNNER', W_REF / 2, H_REF / 2 - 38);
    ctx.shadowBlur = 0;

    ctx.fillStyle = COLORS.textDim;
    ctx.font = `500 11px "JetBrains Mono", monospace`;
    ctx.fillText('Geometry Dash meets One Key', W_REF / 2, H_REF / 2 + 5);

    if (bestScore > 0) {
        const bw = 160,
            bh = 26;
        const bx = W_REF / 2 - bw / 2,
            by = H_REF / 2 + 30;
        ctx.fillStyle = 'rgba(251,191,36,0.08)';
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, 13);
        ctx.fill();
        ctx.strokeStyle = 'rgba(251,191,36,0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, 13);
        ctx.stroke();
        ctx.fillStyle = COLORS.gold;
        ctx.font = `600 11px "JetBrains Mono", monospace`;
        ctx.fillText(`BEST  ${Math.floor(bestScore)}`, W_REF / 2, by + bh / 2);
    }

    const pulse = reducedMotion ? 1 : (Math.sin(frameCount * 0.04) * 0.35 + 0.65);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = COLORS.accent;
    ctx.font = `700 14px "JetBrains Mono", monospace`;
    const startY = H_REF / 2 + (bestScore > 0 ? 78 : 65);
    ctx.fillText('PRESS ANY KEY TO START', W_REF / 2, startY);
    ctx.globalAlpha = 1;

    ctx.fillStyle = COLORS.textDim;
    ctx.font = `400 10px "JetBrains Mono", monospace`;
    ctx.fillText('Space / Enter / Click / Tap', W_REF / 2, H_REF / 2 + (bestScore > 0 ? 105 : 90));

    ctx.fillStyle = 'rgba(255,235,210,0.08)';
    ctx.font = `400 9px "JetBrains Mono", monospace`;
    ctx.fillText('Press M or click ⚙ for settings', W_REF / 2, H_REF / 2 + (bestScore > 0 ? 132 : 117));
}

function drawHUD() {
    const scoreText = `SCORE: ${Math.floor(score)}`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.font = `700 16px "JetBrains Mono", monospace`;
    const metrics = ctx.measureText(scoreText);
    const tw = metrics.width;
    const pad = 18;
    const pillW = tw + pad * 2;
    const pillH = 34;
    const pillX = W_REF - pillW - 12;
    const pillY = 14;

    ctx.fillStyle = 'rgba(26,20,16,0.8)';
    ctx.beginPath();
    ctx.roundRect(pillX, pillY, pillW, pillH, 17);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,235,210,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(pillX, pillY, pillW, pillH, 17);
    ctx.stroke();

    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#f5ece6';
    ctx.font = `700 16px "JetBrains Mono", monospace`;
    ctx.fillText(scoreText, pillX + pad, pillY + 8);

    const speedPct = Math.min(100, ((speed - BASE_SPEED) / (MAX_SPEED - BASE_SPEED)) * 100);
    const barX = 16,
        barY = 18,
        barW = 80,
        barH = 4;
    ctx.fillStyle = 'rgba(255,235,210,0.08)';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, 2);
    ctx.fill();
    ctx.fillStyle = speedPct > 75 ? COLORS.gold : COLORS.accent;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW * (speedPct / 100), barH, 2);
    ctx.fill();

    ctx.fillStyle = COLORS.textDim;
    ctx.font = `400 8px "JetBrains Mono", monospace`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('speed', barX, barY + barH + 4);
    ctx.font = `500 10px "JetBrains Mono", monospace`;
    ctx.fillText(speed.toFixed(1), barX + 48, barY + barH + 2);

    if (bestScore > 0) {
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = 'rgba(168,152,136,0.4)';
        ctx.font = `400 9px "JetBrains Mono", monospace`;
        ctx.fillText('BEST ' + Math.floor(bestScore), 16, H_REF - 16);
    }

    if (speedPct > 70) {
        const da = (speedPct - 70) / 30 * 0.1;
        ctx.fillStyle = `rgba(220,38,38,${da.toFixed(3)})`;
        ctx.fillRect(0, 0, W_REF, H_REF);
    }
}

function drawDeathOverlay() {
    ctx.fillStyle = COLORS.deathOverlay;
    ctx.fillRect(0, 0, W_REF, H_REF);

    ctx.shadowColor = 'rgba(220,38,38,0.35)';
    ctx.shadowBlur = 35;
    ctx.fillStyle = '#f5ece6';
    ctx.font = `400 34px "Bebas Neue", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GAME OVER', W_REF / 2, H_REF / 2 - 50);
    ctx.shadowBlur = 0;

    ctx.fillStyle = COLORS.text;
    ctx.font = `500 16px "JetBrains Mono", monospace`;
    ctx.fillText('Score  ' + Math.floor(score), W_REF / 2, H_REF / 2);

    if (Math.floor(score) >= bestScore && score > 0) {
        ctx.fillStyle = COLORS.gold;
        ctx.font = `700 12px "JetBrains Mono", monospace`;
        ctx.shadowColor = COLORS.goldGlow;
        ctx.shadowBlur = 12;
        ctx.fillText('NEW BEST', W_REF / 2, H_REF / 2 + 28);
        ctx.shadowBlur = 0;
    } else if (bestScore > 0) {
        ctx.fillStyle = COLORS.textDim;
        ctx.font = `400 11px "JetBrains Mono", monospace`;
        ctx.fillText('Best  ' + bestScore, W_REF / 2, H_REF / 2 + 28);
    }

    const pulse = reducedMotion ? 1 : (Math.sin(frameCount * 0.04) * 0.35 + 0.65);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = COLORS.accent;
    ctx.font = `600 12px "JetBrains Mono", monospace`;
    ctx.fillText('PRESS ANY KEY TO RESTART', W_REF / 2, H_REF / 2 + 70);
    ctx.globalAlpha = 1;
}

// ---- Menu HTML interaction --------------------------------------------
const menuOverlay = document.getElementById('menuOverlay');
const menuBox = document.getElementById('menuBox');
const closeMenuBtn = document.getElementById('closeMenu');
const soundToggle = document.getElementById('soundToggle');
const resetBestBtn = document.getElementById('resetBest');
const colorSwatches = document.getElementById('colorSwatches');

function toggleMenu(open) {
    if (open === undefined) {
        const isOpen = menuBox.classList.contains('active');
        open = !isOpen;
    }
    if (open) {
        menuBox.classList.add('active');
        menuOverlay.classList.add('active');
        soundToggle.textContent = settings.sound ? 'On' : 'Off';
        soundToggle.className = 'toggle-btn' + (settings.sound ? ' on' : '');
        document.querySelectorAll('.color-swatch').forEach(el => {
            el.classList.toggle('active', el.dataset.color === settings.color);
        });
    } else {
        menuBox.classList.remove('active');
        menuOverlay.classList.remove('active');
    }
}

closeMenuBtn.addEventListener('click', () => toggleMenu(false));

soundToggle.addEventListener('click', () => {
    settings.sound = !settings.sound;
    saveSettings();
    soundToggle.textContent = settings.sound ? 'On' : 'Off';
    soundToggle.className = 'toggle-btn' + (settings.sound ? ' on' : '');
});

resetBestBtn.addEventListener('click', () => {
    if (confirm('Reset best score to 0?')) {
        bestScore = 0;
        localStorage.setItem('okr_best', '0');
    }
});

colorSwatches.addEventListener('click', (e) => {
    const swatch = e.target.closest('.color-swatch');
    if (!swatch) return;
    const color = swatch.dataset.color;
    settings.color = color;
    player.color = color;
    saveSettings();
    document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
    swatch.classList.add('active');
});

// ---- Keyboard shortcut for menu ---------------------------------------
document.addEventListener('keydown', (e) => {
    if (e.key === 'm' || e.key === 'M') {
        e.preventDefault();
        toggleMenu();
    }
    if (e.key === ' ' || e.key === 'Space' || e.key === 'Enter' || e.key.length === 1) {
        if (menuBox.classList.contains('active')) return;
        e.preventDefault();
        jump();
    }
});

// ---- Canvas click/touch for gear --------------------------------------
canvas.addEventListener('click', (e) => {
    if (menuBox.classList.contains('active')) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) / scale;
    const y = (e.clientY - rect.top) / scale;
    if (state !== STATE.MENU) {
        const g = window._gearRect;
        if (g && x >= g.x && x <= g.x + g.w && y >= g.y && y <= g.y + g.h) {
            toggleMenu();
            return;
        }
    }
    jump();
});

canvas.addEventListener('touchstart', (e) => {
    if (menuBox.classList.contains('active')) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const x = (touch.clientX - rect.left) / scale;
    const y = (touch.clientY - rect.top) / scale;
    if (state !== STATE.MENU) {
        const g = window._gearRect;
        if (g && x >= g.x && x <= g.x + g.w && y >= g.y && y <= g.y + g.h) {
            toggleMenu();
            return;
        }
    }
    jump();
}, { passive: false });

// ---- Visibility / audio -----------------------------------------------
document.addEventListener('visibilitychange', () => {
    if (document.hidden && audioCtx) {
        audioCtx.suspend();
    } else if (!document.hidden && audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
});

// ---- Game loop ---------------------------------------------------------
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

canvas.setAttribute('tabindex', '0');
resetGame();
canvas.focus();

setTimeout(() => {
    loop();
    console.log('ONE KEY RUNNER ready!');
}, 10);
</script>

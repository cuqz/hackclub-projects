name: AI Team OS CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  invariants:
    # 红线不变量：hook 双副本/版本锁步/双 dist 一致/venv 禁令（docs/knowledge-layer-design.md P0）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check invariants
        run: bash scripts/check_invariants.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pip install fastapi uvicorn sqlalchemy aiosqlite pydantic pydantic-settings pyyaml anyio typer rich alembic
          pip install fastmcp || true
          pip install langgraph langchain-anthropic langchain-core || true

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short

  dashboard-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: TypeScript compile check
        working-directory: dashboard
        run: npx tsc -b --noEmit
